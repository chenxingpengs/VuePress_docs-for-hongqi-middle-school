name: 部署文档

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 pnpm
        uses: pnpm/action-setup@v6

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: 安装依赖
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=4096
        run: |-
          # 匹配package.json "build": "vuepress build docs"
          pnpm run build
          # 在正确打包目录生成.nojekyll，防止GitHub Pages忽略下划线文件夹
          touch docs/.vuepress/dist/.nojekyll

      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          # Linux 正斜杠，正确打包输出目录
          folder: docs/.vuepress/dist